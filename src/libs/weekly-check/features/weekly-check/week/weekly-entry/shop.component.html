<div
  class="flex cursor-pointer items-center gap-2 rounded-lg bg-sky-900 p-1 hover:bg-sky-800"
  (click)="openBottomSheet()"
>
  <img [src]="iconPath()" alt="icon" class="h-7 w-7 object-contain" />
  <div class="flex min-w-0 flex-col gap-1">
    <span class="text-xs">{{ label() }}</span>
    <span class="text-sm">{{ entry().value | currency }}</span>
  </div>
</div>
