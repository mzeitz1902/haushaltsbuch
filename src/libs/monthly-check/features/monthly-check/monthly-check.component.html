<app-header title="Monatscheck">
  <button maffiButton icon="CirclePlus" (click)="openCreateMonthDialog()">
    Monat anlegen
  </button>
</app-header>

<section
  class="container-max-sm mt-2 flex flex-col items-center gap-2 p-2 md:p-6"
>
  <div class="grid w-full grid-cols-2 gap-4">
    <ng-select
      [items]="createdYears()"
      [clearable]="false"
      [formField]="yearMonthForm.year"
      placeholder="Jahr auswählen"
    />
    <ng-select
      class="higher"
      bindLabel="translated"
      bindValue="month"
      [items]="currentYearSnapshots()"
      [clearable]="false"
      [formField]="yearMonthForm.snapshot"
      placeholder="Monat auswählen"
    />
    <input type="text" hlmInput class="col-span-2 h-12" placeholder="Eintrag suchen..." [formField]="searchForm">
  </div>

  <cdk-accordion
    class="flex w-full flex-col gap-2 *:w-full"
    animate.enter="animate-fade-in"
  >
    @if (selectedMonth()) {
      @if (hasSearchResults()) {
        @if (filteredRevenue().length > 0) {
          <app-revenue-month-table
            [data]="filteredRevenue()"
            [total]="filteredRevenueTotal()"
            [expanded]="!!searchTerm()"
          />
        }
        @if (filteredFixedCosts().length > 0) {
          <app-fixed-costs-month-table
            [data]="filteredFixedCosts()"
            [total]="filteredFixedCostsTotal()"
            [expanded]="!!searchTerm()"
          />
        }
        @if (filteredBudgets().length > 0) {
          <app-monthly-budgets-table
            [data]="filteredBudgets()"
            [total]="filteredBudgetsTotal()"
            [expanded]="!!searchTerm()"
          />
        }
        @if (filteredVariableCosts().length > 0) {
          <app-variable-costs-table
            [data]="filteredVariableCosts()"
            [total]="filteredVariableCostsTotal()"
            [expanded]="!!searchTerm()"
          />
        }
        @if (!searchTerm()) {
          <app-balance
            [balanceReal]="balanceReal()"
            [balanceForecast]="balanceForecast()"
          />
        }
      } @else {
        <div class="mt-8 flex flex-col items-center justify-center gap-4 text-gray-400">
          <p class="text-lg font-medium">Kein Eintrag gefunden</p>
        </div>
      }
    }
  </cdk-accordion>
</section>
