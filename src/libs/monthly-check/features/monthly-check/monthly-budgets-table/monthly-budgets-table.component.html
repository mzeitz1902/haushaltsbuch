<app-money-table-v2
  headerTitle="Budgets"
  headerIcon="BanknoteArrowUp"
  useDataTemplate="valuesWithHistory"
  valuesWithHistoryKind="budgets"
  [data]="dataInput() ?? data()"
  [isAdded]="isAdded()"
  [isLoading]="isLoading()"
  [isSaving]="isSaving()"
  [total]="totalInput() ?? totalBudgets()"
  [expanded]="expanded()"
  [hasSum]="false"
  (addRow)="add()"
  (deleteRow)="delete($event)"
  (updateRow)="update($event)"
  (resetAddHistoryEntryProcessStatus)="resetAddHistoryEntryProcessStatus()"
/>
