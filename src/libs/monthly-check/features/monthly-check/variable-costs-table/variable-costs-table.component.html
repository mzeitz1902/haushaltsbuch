<app-money-table-v2
  headerTitle="Variabel"
  headerIcon="BanknoteArrowUp"
  useDataTemplate="values"
  valuesWithHistoryKind="variableCosts"
  [data]="dataInput() ?? variableCosts()"
  [isAdded]="isAdded()"
  [isLoading]="isLoading()"
  [isSaving]="isSaving()"
  [total]="totalInput() ?? totalVariableCosts()"
  [expanded]="expanded()"
  (addRow)="add()"
  (deleteRow)="delete($event)"
  (updateRow)="update($event)"
  (resetAddHistoryEntryProcessStatus)="resetAddHistoryEntryProcessStatus()"
/>
