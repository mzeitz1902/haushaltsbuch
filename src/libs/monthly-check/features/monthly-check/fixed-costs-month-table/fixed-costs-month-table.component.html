<app-money-table-v2
  headerTitle="Fixkosten"
  headerIcon="BanknoteArrowDown"
  [data]="data() ?? fixedCosts()"
  [total]="total() ?? totalFixedCosts()"
  [expanded]="expanded()"
  [isLoading]="isLoading()"
  [isSaving]="isSaving()"
  [isAdded]="isAdded()"
  (addRow)="addFixedCost()"
  (updateRow)="updateFixedCost($event)"
  (deleteRow)="deleteFixedCost($event)"
/>
