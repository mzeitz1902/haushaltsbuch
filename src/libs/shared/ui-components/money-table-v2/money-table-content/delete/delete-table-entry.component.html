<hlm-dialog>
  <button
    maffiButton
    hlmDialogTrigger
    class="mb-1 h-full"
    icon="Trash"
    size="mini"
    theme="secondary"
  ></button>
  <hlm-dialog-content *hlmDialogPortal="let ctx" class="w-xs bg-gray-700">
    <hlm-dialog-header>
      <h1 hlmDialogTitle class="text-red-500">Eintrag löschen?</h1>
    </hlm-dialog-header>
    <hlm-dialog-footer class="flex flex-row items-center justify-end">
      <button hlmBtn variant="ghost" hlmDialogClose>Abbrechen</button>
      <button
        hlmBtn
        type="submit"
        variant="destructive"
        (click)="deleteClick.emit()"
      >
        Löschen
      </button>
    </hlm-dialog-footer>
  </hlm-dialog-content>
</hlm-dialog>
