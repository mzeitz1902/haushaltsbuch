<section class="flex flex-col gap-2 overflow-hidden pb-2">
  <div #historyScroll class="max-h-64 overflow-auto">
    <div class="flex w-full flex-col items-center justify-center **:text-white">
      @for (entry of currentHistory(); track entry.id) {
        <div
          class="grid w-full grid-cols-[5.8rem_8em_6rem_min-content] items-center gap-2 px-2 py-2 **:text-sm"
        >
          <span
            [class.hidden]="selectedEntry() === entry.id"
            (click)="edit(entry, 'date')"
          >
            {{ entry.date | date: 'dd.MM.' }}
          </span>
          <span
            class="truncate overflow-hidden"
            [matTooltip]="entry.note"
            [class.hidden]="selectedEntry() === entry.id"
            (click)="edit(entry, 'note')"
          >
            {{ entry.note }}
          </span>
          <span
            [class.hidden]="selectedEntry() === entry.id"
            (click)="edit(entry, 'value')"
            class="m-0! my-0! w-full text-right"
          >
            {{ entry.value | currency }}
          </span>

          <hlm-date-picker
            class="w-full border-blue-400 bg-gray-600 outline-none"
            [class.hidden]="selectedEntry() !== entry.id"
            [formField]="form.date"
          />

          <input
            #noteInput
            hlmInput
            [attr.data-id]="entry.id"
            class="w-full rounded-md border border-blue-400 bg-gray-600 outline-none"
            [class.hidden]="selectedEntry() !== entry.id"
            [formField]="form.note"
            (click)="noteInput.select()"
            (blur)="submit()"
            (keyup.enter)="submit(); reset()"
          />
          <input
            type="number"
            #valueInput
            hlmInput
            [attr.data-id]="entry.id"
            class="w-full rounded-md border border-blue-400 bg-gray-600 text-right outline-none"
            [class.hidden]="selectedEntry() !== entry.id"
            [formField]="form.value"
            (click)="valueInput.select()"
            (blur)="submit()"
            (keyup.enter)="submit(); reset()"
          />

          <button
            class="mr-2"
            maffiButton
            icon="Trash"
            (click)="deleteHistory(entry.id)"
          ></button>
        </div>
        @if (!$last) {
          <hr menuDivider />
        }
      } @empty {
        <div class="p-2">Noch keine Einträge vorhanden.</div>
      }
    </div>
  </div>
  <button
    class="self-center"
    maffiButton
    icon="CirclePlus"
    (click)="addHistory()"
  >
    Hinzufügen
  </button>
</section>
